services:
  web:
    image: oven/bun:1
    working_dir: /app
    command: sh -c "bun install && bun run dev:web"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    networks:
      - caddy
    labels:
      caddy: shipproof.lol
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 3001}}"

  server:
    image: oven/bun:1
    working_dir: /app
    command: sh -c "bun install && bun run dev:server"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    networks:
      - caddy
    labels:
      caddy: api.shipproof.lol
      caddy.tls: internal
      caddy.reverse_proxy: "{{upstreams 3000}}"

volumes:
  node_modules:

networks:
  caddy:
    external: true
